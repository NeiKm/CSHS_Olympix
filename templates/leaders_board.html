<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard | CSHS Olympix</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="static\css\style.css">
    <link rel="stylesheet" href="static\css\leaders_board.css">
</head>
<body>

    <nav class="navbar">
        <div class="container nav-flex">
            <a href="/" class="logo">CHONAN <span>CSHS</span></a>
            <button class="menu-toggle" aria-label="Menu">☰</button>
            <ul class="nav-links">
                <li><a href="/" data-i18n="nav_dashboard">Главное</a></li>
                <li><button id="theme-toggle" aria-label="Toggle Theme">🌙</button></li>
                <li>
                    <select id="lang-selector" class="lang-select">
                        <option value="ko">🇰🇷 한국어</option>
                        <option value="en">🇺🇸 English</option>
                        <option value="ru">🇷🇺 Русский</option>
                        <option value="zh">🇨🇳 中文</option>
                        <option value="vi">🇻🇳 Tiếng Việt</option>
                        <option value="mn">🇲🇳 Монгол</option>
                        <option value="ja">🇯🇵 日本語</option>
                    </select>
                </li>
            </ul>
        </div>
    </nav>

    <main class="leaderboard-page">
        <header class="lb-hero">
            <div class="lb-hero-content">
                <span class="badge" data-i18n="lb_hero_badge">Зал славы CSHS</span>
                <h1 data-i18n="lb_title">Таблица лидеров</h1>
                <p data-i18n="lb_desc">Докажи своё превосходство. Поднимись на вершину рейтинга.</p>
                
                <div class="category-tabs" id="category-tabs">
                    <button class="tab active" data-cat="study">📚 Учеба</button>
                    <button class="tab" data-cat="sport">🏃 Спорт</button>
                    <button class="tab" data-cat="dev">💻 Программирование</button>
                </div>
            </div>
            <div class="lb-glow"></div>
        </header>

        <section class="top-podium" id="top-podium">
            <!-- JS injects top 3 here -->
            <div class="podium-loader">⏳ Загрузка рейтинга...</div>
        </section>

        <section class="leaderboard-main">
            <div class="lb-controls">
                <div class="search-box">
                    <input type="text" id="search-input" data-i18n-placeholder="lb_search" placeholder="Поиск ученика или ID...">
                    <span class="search-icon">🔍</span>
                </div>
                <div class="lb-stats">
                    <span class="stat-pill">👥 ???? участников</span>
                    <span class="stat-pill highlight">🔥 Обновлено: 999999 мин. назад</span>
                </div>
            </div>

            <div class="lb-header">
                <span class="col-rank">#</span>
                <span class="col-name">Студент</span>
                <span class="col-score">Очки</span>
                <span class="col-trend">Тренд</span>
                <span class="col-progress">Прогресс к лидеру</span>
            </div>

            <div id="leader-list" class="leader-list"></div>
        </section>
    </main>

    <footer class="main-footer">
        <div class="container">
            <p data-i18n="footer_text">2026 천안상업고등학교 | Неофициальный студенческий проект</p>
        </div>
    </footer>

    <script src="static\js\script.js"></script>
    <script src="static\js\leaders_board.js"></script>
</body>
</html>
